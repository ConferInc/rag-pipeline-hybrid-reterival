# Config for embedding generation (initial setup + ongoing)
# Used by GraphSAGE training and semantic embedding workers

# Neo4j schema (actual nodes and relationships in database) — used for reference
# Recipe calories: (Recipe)-[:HAS_NUTRITION]->(NutritionValue)-[:OF_NUTRIENT]->(NutrientDefinition {nutrient_name: 'Calories/Energy'})
# Diet compliance: (Dietary_Preferences)-[:FORBIDDEN]->(Ingredient)
neo4j_schema:
  node_labels:
    - Recipe
    - Ingredient
    - NutritionValue
    - NutrientDefinition
    - Cuisine
    - Product
    - B2C_Customer
    - Dietary_Preferences
    - Allergens
    - B2C_Customer_Health_Conditions
    - B2C_Customer_Health_Profiles
    - Household
    - MealLog
    - MealLogItem
    - MealPlan
    - MealPlanItem
  relationship_types:
    - HAS_NUTRITION       # Recipe->NutritionValue, Ingredient->NutritionValue
    - OF_NUTRIENT         # NutritionValue->NutrientDefinition
    - USES_INGREDIENT     # Recipe->Ingredient
    - FORBIDDEN           # Dietary_Preferences->Ingredient (diet compliance)
    - FOLLOWS_DIET        # B2C_Customer->Dietary_Preferences
    - IS_ALLERGIC         # B2C_Customer->Allergens
    - HAS_PROFILE
    - HAS_CONDITION
    - BELONGS_TO
    - VIEWED
    - SAVED
    - RATED
    - BELONGS_TO_CUSINE
    - CONTAINS_ITEM       # MealLog->MealLogItem, MealPlan->MealPlanItem

# Embedding cache: avoids repeat API calls for duplicate/similar user queries
embedding_cache:
  enabled: true
  max_size: 500
  key_normalize: strip_lower  # strip_lower | strip | none

# Intent cache: avoids repeat LLM calls for duplicate/similar queries
intent_cache:
  enabled: true
  max_size: 500
  key_normalize: strip_lower  # strip_lower | strip | none

# Logging (structured JSON, PII-safe)
logging:
  level: INFO
  format: human  # json | human
  truncate_query_max: 200
  include_stack_trace_on_error: true

graph_sage:
  # Graph projection for training
  graph_name: customer_recipe_graph
  node_labels:
    - B2C_Customer
    - Recipe
    - Product
    - Ingredient
    - Cuisine
    - Household
    - Allergens
    - Dietary_Preferences
    - B2C_Customer_Health_Profiles
    - B2C_Customer_Health_Conditions
  relationship_types:
    - HAS_PROFILE
    - HAS_CONDITION
    - IS_ALLERGIC
    - FOLLOWS_DIET
    - BELONGS_TO
    - VIEWED
    - RATED
    - SAVED
    - REJECTED
    - WHITELISTED
    - BLACKLISTED
    - TRIED
    - USES_INGREDIENT
    - BELONGS_TO_CUSINE
    - HAS_NUTRITION       # Recipe/Ingredient->NutritionValue (calorie filter)
    - OF_NUTRIENT         # NutritionValue->NutrientDefinition
    - FORBIDDEN           # Dietary_Preferences->Ingredient (diet filter)
  # Numeric properties to use as GraphSAGE features (must exist on all projected nodes)
  # Add your node numeric properties here
  feature_properties: []
  # Fallback if nodes lack numeric features - will add dummyFeature = 1.0
  use_dummy_feature_fallback: true
  model_name: b2c_customer_model
  embedding_dimension: 128
  write_property: graphSageEmbedding

semantic:
  # Per-label text assembly: which properties to concatenate for embedding
  label_text_rules:
    Recipe:
      properties: [id, title, description, difficulty, cuisine_code, total_time_minutes]
      separator: " "
    Ingredient:
      properties: [id, name, category]
      separator: " "
    Product:
      properties: [id, name, brand, status]
      separator: " "
    B2C_Customer:
      properties: [id, email, full_name, gender]
      separator: " "
    Cuisine:
      properties: [id, code]
      separator: " "
  write_property: semanticEmbedding

vector_indexes:
  semantic:
    - label: Recipe
      property: semanticEmbedding
      dimensions: 1536
      index_name: vec_recipe_semanticembedding
    - label: Ingredient
      property: semanticEmbedding
      dimensions: 1536
      index_name: vec_ingredient_semanticembedding
    - label: Product
      property: semanticEmbedding
      dimensions: 1536
      index_name: vec_product_semanticembedding
    - label: B2C_Customer
      property: semanticEmbedding
      dimensions: 1536
      index_name: vec_b2c_customer_semanticembedding
    - label: Cuisine
      property: semanticEmbedding
      dimensions: 1536
      index_name: vec_cuisine_semanticembedding
  structural:
    - label: Allergens
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_allergens_graphsageembedding
    - label: B2C_Customer
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_b2c_customer_graphsageembedding
    - label: B2C_Customer_Health_Profiles
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_b2c_customer_health_profiles_graphsageembedding
    - label: B2C_Customer_Health_Conditions
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_b2c_customer_health_conditions_graphsageembedding
    - label: Cuisine
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_cuisine_graphsageembedding
    - label: Dietary_Preferences
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_dietary_preferences_graphsageembedding
    - label: Household
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_household_graphsageembedding
    - label: Ingredient
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_ingredient_graphsageembedding
    - label: Product
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_product_graphsageembedding
    - label: Recipe
      property: graphSageEmbedding
      dimensions: 128
      index_name: vec_recipe_graphsageembedding

# Intent / entity extraction failure handling (defaults preserve current flow)
intent_extraction:
  # On JSON parse failure: "abort" (current), "fallback", or "retry"
  on_parse_failure: abort
  fallback_intent: find_recipe
  fallback_entities: {}
  # When confidence < threshold, use fallback_intent and fallback_entities (0.0–1.0)
  confidence_threshold: 0.7
  max_retries: 1
  retry_user_message: "Return only valid JSON with keys 'intent', 'entities', and 'confidence' (0–1, required). No markdown."
  # Entity heuristics: add missing entities from query keywords (exclude_ingredient, diet, course)
  entity_enrichment_enabled: true
  entity_fallbacks:
    diet_keywords:
      gluten-free: [Gluten-Free]
      gluten free: [Gluten-Free]
      vegan: [Vegan]
      vegetarian: [Vegetarian]
      keto: [Keto]
      paleo: [Paleo]
      dairy-free: [Dairy-Free]
      dairy free: [Dairy-Free]
      nut-free: [Nut-Free]
      nut free: [Nut-Free]
      high-protein: [High-Protein]
      low-fat: [Low-Fat]
      low-carb: [Low-Carb]
    course_keywords:
      breakfast: breakfast
      lunch: lunch
      dinner: dinner
      dessert: dessert
      appetizer: appetizer
      main course: main_dish
      main dish: main_dish
      side dish: side_dish
      salad: salad
      soup: soup
      snack: snack
  # Wrong intent: broaden semantic search when query is short/ambiguous (disabled by default)
  broaden_on_low_confidence: false
  broaden_max_word_count: 3
  broaden_labels: [Recipe, Ingredient]

# LLM retry (retries only on 429, timeout, connection, 5xx)
llm_retry:
  max_attempts: 3
  initial_delay_ms: 1000
  max_delay_ms: 30000
  jitter: true

# Generation (response generation cost tuning)
# Env vars GENERATION_MODEL, GENERATION_MAX_TOKENS override these.
generation:
  model: openai/gpt-4o-mini      # Cheaper: gpt-4o-mini | Higher quality: gpt-4o
  max_tokens: 1024               # Lower = less cost; 512-1024 usually enough for recipe answers
  temperature: 0.5               # 0-0.5 = more deterministic, 0.5-0.7 = slightly creative

# Response post-validation (forbidden items: allergens, excluded ingredients)
response_validation:
  enabled: false
  action: warn  # warn | truncate | reject
  forbidden_extra_terms: []  # Additional terms beyond exclude_ingredient
  warn_disclaimer: "\n\n_Please verify allergens and dietary restrictions before consuming._"
  reject_fallback_message: "I couldn't safely generate a recommendation. Please verify any dietary restrictions or allergens."
  truncate_fallback_message: "Some content was removed for safety. Please double-check allergens and dietary restrictions."

# Retrieval failure handling (keep pipeline running on retrieval failures)
retrieval_failure_handling:
  skip_on_failure: true
  all_empty:
    skip_generation: true
    user_message: "No recipes could be loaded right now. Please try again."

# Retrieval guardrails (thresholds applied before fusion/RRF)
retrieval_guardrails:
  # Per-retrieval timeout in ms; on timeout, that path returns empty (best-effort).
  timeout_ms: 15000
  semantic:
    min_score: 0.5
  structural:
    min_score: 0.5
  cypher:
    max_rows: 50
  rrf:
    k: 60
    max_items: 10

# Label inference (for semantic search when --label not provided)
label_inference:
  allowed_labels: [Recipe, Ingredient, Product, B2C_Customer, Cuisine]
  fallback_to_llm: true
  default_label: Recipe

# Label inference cache (avoids repeat LLM calls for same query)
label_cache:
  enabled: true
  max_size: 500
  key_normalize: strip_lower

# Intent → semantic label routing
# Maps extractor_classifier intent to which semantic index to search
intent_semantic_labels:
  find_recipe: Recipe
  find_recipe_by_pantry: Recipe
  similar_recipes: Recipe
  recipes_for_cuisine: Recipe
  recipes_by_nutrient: Recipe
  rank_results: Recipe
  get_nutritional_info: Ingredient
  nutrient_in_foods: Ingredient
  nutrient_category: Ingredient  # Cypher primary; semantic fallback
  compare_foods: Ingredient
  check_diet_compliance: Ingredient
  check_substitution: Ingredient
  get_substitution_suggestion: Ingredient
  similar_ingredients: Ingredient
  ingredient_in_recipes: Recipe
  ingredient_nutrients: Ingredient
  find_product: Product
  product_nutrients: Product
  cuisine_recipes: Recipe
  cuisine_hierarchy: Cuisine
  cross_reactive_allergens: Ingredient  # Cypher primary (Allergens)
  general_nutrition: Ingredient
  out_of_scope: Recipe

# Intent → structural expansion config
# Maps intent to seed label + which labels/rels to expand into
intent_structural:
  find_recipe:
    seed_label: B2C_Customer
    expand_labels: [Recipe]
    expand_relationships: [SAVED, RATED, LIKED, VIEWED]
  find_recipe_by_pantry:
    seed_label: B2C_Customer
    expand_labels: [Recipe]
    expand_relationships: [SAVED, RATED, LIKED, VIEWED]

# Intent-based filtering for structural expansion
# Maps intent → which labels and relationships to keep after k-hop expansion
intent_filters:
  recommend_recipe:
    labels: [Recipe]
    relationships: [SAVED, RATED, LIKED, VIEWED]
  check_allergen:
    labels: [Allergens]
    relationships: [IS_ALLERGIC]
  dietary_info:
    labels: [Dietary_Preferences]
    relationships: [FOLLOWS_DIET]
  health_condition:
    labels: [B2C_Customer_Health_Conditions]
    relationships: [HAS_CONDITION]
  similar_customer:
    labels: [B2C_Customer]
    relationships: []
  ingredient_info:
    labels: [Ingredient]
    relationships: [USES_INGREDIENT]
  cuisine_preference:
    labels: [Cuisine, Recipe]
    relationships: [BELONGS_TO_CUSINE]
